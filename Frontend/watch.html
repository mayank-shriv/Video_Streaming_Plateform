<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watch — ViewTube</title>
    <meta name="description" content="Watch videos on ViewTube — the modern video streaming platform." />
    <link rel="stylesheet" href="css/global.css" />
    <style>
        .watch-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
            max-width: 1600px;
        }

        /* ── VIDEO PLAYER ──────────────────── */
        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .player-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ── VIDEO INFO ────────────────────── */
        .video-info {
            margin-top: 16px;
        }
        .video-info__title {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 12px;
        }
        .video-info__stats {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .video-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .video-actions .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius-full);
            background: var(--bg-tertiary);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            cursor: pointer;
        }
        .video-actions .action-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .video-actions .action-btn.active {
            background: rgba(255, 68, 68, 0.15);
            color: var(--accent);
        }
        .video-actions .action-btn svg {
            width: 18px;
            height: 18px;
        }

        /* ── CHANNEL BAR ───────────────────── */
        .channel-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .channel-bar__avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }
        .channel-bar__info {
            flex: 1;
        }
        .channel-bar__name {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .channel-bar__name a {
            transition: color var(--transition-fast);
        }
        .channel-bar__name a:hover {
            color: var(--accent);
        }
        .channel-bar__subs {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .subscribe-btn {
            padding: 8px 20px;
            border-radius: var(--radius-full);
            background: var(--text-primary);
            color: var(--text-inverse);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .subscribe-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* ── DESCRIPTION ───────────────────── */
        .video-description {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 24px;
        }
        .video-description__text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            white-space: pre-line;
        }
        .video-description__toggle {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 8px;
            display: inline-block;
        }

        /* ── SIDEBAR (Suggestions) ─────────── */
        .suggestions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .suggestions__title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .suggestion-card {
            display: flex;
            gap: 10px;
            padding: 8px;
            border-radius: var(--radius-md);
            transition: background var(--transition-fast);
            text-decoration: none;
            color: inherit;
        }
        .suggestion-card:hover {
            background: var(--bg-glass-hover);
        }
        .suggestion-card__thumb {
            position: relative;
            width: 168px;
            min-width: 168px;
            aspect-ratio: 16/9;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--bg-tertiary);
        }
        .suggestion-card__thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .suggestion-card__duration {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .suggestion-card__info {
            flex: 1;
            min-width: 0;
        }
        .suggestion-card__title {
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .suggestion-card__channel {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .suggestion-card__stats {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* ── COMMENTS ──────────────────────── */
        .comments-section {
            margin-top: 8px;
        }
        .comments-section__header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
        }
        .comments-section__count {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .comment-input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }
        .comment-input-area img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .comment-input-area input {
            flex: 1;
            background: transparent;
            border-bottom: 1px solid var(--border);
            padding: 8px 0;
            font-size: 0.9rem;
            color: var(--text-primary);
            transition: border-color var(--transition-fast);
        }
        .comment-input-area input:focus {
            border-color: var(--text-primary);
        }

        .comment {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .comment__avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }
        .comment__body {
            flex: 1;
        }
        .comment__header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }
        .comment__author {
            font-size: 0.85rem;
            font-weight: 600;
        }
        .comment__time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .comment__text {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        @media (max-width: 1024px) {
            .watch-layout {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 768px) {
            .player-wrapper {
                border-radius: 0;
                margin: 0 -16px;
                width: calc(100% + 32px);
            }
        }
    </style>
</head>
<body>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script>
        renderNavbar();

        const main = document.createElement('main');
        main.className = 'main-content';
        main.style.marginLeft = '0';
        document.body.appendChild(main);

        // Get video ID from URL
        const params = new URLSearchParams(window.location.search);
        const videoId = params.get('v');

        // Find video from mock data
        const video = MOCK_VIDEOS.find(v => v._id === videoId) || MOCK_VIDEOS[0];
        const suggestions = MOCK_VIDEOS.filter(v => v._id !== video._id).slice(0, 8);

        // Mock comments
        const COMMENTS = [
            { author: 'CodeNinja', avatar: 'https://ui-avatars.com/api/?name=Code+Ninja&background=6366f1&color=fff', text: 'This is exactly what I needed! Great explanation of the concepts.', time: '2 days ago' },
            { author: 'DevLearner', avatar: 'https://ui-avatars.com/api/?name=Dev+Learner&background=22c55e&color=fff', text: 'Been looking for a tutorial like this for weeks. Subscribed!', time: '5 days ago' },
            { author: 'TechExplorer', avatar: 'https://ui-avatars.com/api/?name=Tech+Explorer&background=ec4899&color=fff', text: 'Can you do a follow-up covering testing and deployment? That would be amazing.', time: '1 week ago' },
            { author: 'JSFanatic', avatar: 'https://ui-avatars.com/api/?name=JS+Fanatic&background=f59e0b&color=fff', text: 'The code quality is impressive. Learned a lot from this.', time: '1 week ago' },
            { author: 'WebArtisan', avatar: 'https://ui-avatars.com/api/?name=Web+Artisan&background=0ea5e9&color=fff', text: 'Bookmarked this for future reference. Thank you!', time: '2 weeks ago' },
        ];

        const user = Auth.getUser();
        const userAvatar = user?.avatar || 'https://ui-avatars.com/api/?name=User&background=333&color=fff';

        document.title = `${video.title} — ViewTube`;

        main.innerHTML = `
            <div class="watch-layout">
                <div class="watch-primary">
                    <div class="player-wrapper">
                        <video controls autoplay>
                            <source src="${video.videoFile}" type="video/mp4" />
                            Your browser does not support video playback.
                        </video>
                    </div>

                    <div class="video-info">
                        <h1 class="video-info__title">${video.title}</h1>
                        <div class="video-info__stats">
                            <span>${formatViews(video.view)} views</span>
                            <span>•</span>
                            <span>${formatTimeAgo(video.createdAt)}</span>
                        </div>

                        <div class="video-actions">
                            <button class="action-btn" id="like-btn">
                                ${Icons.thumbsUp}
                                <span>Like</span>
                            </button>
                            <button class="action-btn">
                                ${Icons.share}
                                <span>Share</span>
                            </button>
                            <button class="action-btn">
                                ${Icons.save}
                                <span>Save</span>
                            </button>
                        </div>

                        <div class="channel-bar">
                            <img src="${video.owner.avatar}" alt="${video.owner.fullname}" class="channel-bar__avatar" />
                            <div class="channel-bar__info">
                                <div class="channel-bar__name">
                                    <a href="/channel.html?u=${video.owner.username}">${video.owner.fullname}</a>
                                </div>
                                <div class="channel-bar__subs">${Math.floor(Math.random() * 500 + 10)}K subscribers</div>
                            </div>
                            <button class="subscribe-btn" id="subscribe-btn">Subscribe</button>
                        </div>

                        <div class="video-description">
                            <div class="video-description__text" id="desc-text">${video.describtion}</div>
                        </div>

                        <div class="comments-section">
                            <div class="comments-section__header">
                                <span class="comments-section__count">${COMMENTS.length} Comments</span>
                            </div>

                            <div class="comment-input-area">
                                <img src="${userAvatar}" alt="You" />
                                <input type="text" placeholder="Add a comment..." />
                            </div>

                            <div id="comments-list">
                                ${COMMENTS.map(c => `
                                    <div class="comment">
                                        <img src="${c.avatar}" alt="${c.author}" class="comment__avatar" />
                                        <div class="comment__body">
                                            <div class="comment__header">
                                                <span class="comment__author">@${c.author}</span>
                                                <span class="comment__time">${c.time}</span>
                                            </div>
                                            <div class="comment__text">${c.text}</div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="suggestions">
                    <div class="suggestions__title">Up Next</div>
                    ${suggestions.map(s => `
                        <a href="/watch.html?v=${s._id}" class="suggestion-card">
                            <div class="suggestion-card__thumb">
                                <img src="${s.thumbnail}" alt="${s.title}" loading="lazy" />
                                <span class="suggestion-card__duration">${s.duration}</span>
                            </div>
                            <div class="suggestion-card__info">
                                <div class="suggestion-card__title">${s.title}</div>
                                <div class="suggestion-card__channel">${s.owner.fullname}</div>
                                <div class="suggestion-card__stats">${formatViews(s.view)} views • ${formatTimeAgo(s.createdAt)}</div>
                            </div>
                        </a>
                    `).join('')}
                </div>
            </div>
        `;

        // Like button toggle
        document.getElementById('like-btn')?.addEventListener('click', function() {
            this.classList.toggle('active');
        });

        // Subscribe button toggle
        document.getElementById('subscribe-btn')?.addEventListener('click', function() {
            if (this.textContent === 'Subscribe') {
                this.textContent = 'Subscribed';
                this.style.background = 'var(--bg-tertiary)';
                this.style.color = 'var(--text-secondary)';
            } else {
                this.textContent = 'Subscribe';
                this.style.background = '';
                this.style.color = '';
            }
        });
    </script>
</body>
</html>
